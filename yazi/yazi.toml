[mgr]
show_hidden = true
ratio = [2, 3, 3]
sort_by = "natural"
sort_sensitive = true
sort_dir_first = true
show_symlink = true
scrolloff = 200

[preview]
warp = "yes"
max_width = 2000
max_height = 2000

[opener]
xopp = [
	{ run = 'xournalpp "$@"', block = false, orphan = true, for = "unix", desc = "Xournalpp" },
]
ipe = [
	{ run = 'ipe "$@"', block = false, orphan = true, for = "unix", desc = "ipe" },
]
emacsclient = [
	{ run = 'emacsclient "$@"', block = false, orphan = true, for = "unix", desc = "Emacsclient"}
]
rnote = [
	{ run = 'flatpak run com.github.flxzt.rnote "$@"', block = false, orphan = true, for = "unix", desc = "Rnote" },
]
play = [
	{ run = 'mpv "$@"', block = true, for = "unix" },
]
edit = [
	{ run = '/home/artin/Vshrd/shell-scripts/neovim_handler.sh "$@"', block = true, orphan=true,for = "unix" },
]
open = [
	{ run = 'xdg-open "$@"', desc = "Open" },
]
img = [
{ run = 'mupdf "$@"', block = false, orphan = true, desc = "Viewer" },
]
dis = [
{ run = 'zathura "$@"', block = false, orphan = true, desc = "Viewer" },
]
office = [
{ run = 'libreoffice "$@"', block = false, orphan = true, desc = "Office" },
]
draw = [
{ run = 'drawio "$@"', block = false, orphan = true, desc = "Draw" },
]
[open]
rules = [
	{ url = "*.rnote", use = "rnote" },
	{ url = "*.xopp", use = "xopp" },
	{ url = "*.drawio", use = "draw" },
	{ url  = "*.ipe", use = "ipe" },
	{ mime = "text/*", use = "edit" },
	{ mime = "video/*", use = "play" },
	{ mime = "music/*", use = "play" },
	{ mime = "image/*", use = "img" },
	{ mime = "application/pdf", use = "dis" },
	{ mime = "application/epub+zip", use = "dis" },
	{ mime = "application/oasis.opendocument.graphics", use = "office" },
	{ mime = "application/oasis.opendocument.text", use = "office" },

	# { mime = "application/json", use = "edit" },
	{ url  = "*.json", use = "edit" },
	{ url = "*.toml", use = "edit" },
	{ url  = "*.md", use = "edit" },
	{ url  = "*.lua", use = "edit" },
	{ url  = "*.py", use = "edit" },
	{ url  = "*.org", use = "edit" },
	{ url  = "*.typ", use = "edit" },

	# Multiple openers for a single rule
	{ url  = "*.html", use = "edit" },
]
[plugin]
prepend_previewers = [
	# HEIC previewer
	{ mime = "image/heic", run = "heic" },
	# RAF previewer
	{ url  = "*.raf", run = "raf" },
]

append_previewers = [
	# My fallback previewer
	{ url  = "*", run = "binary" },
]

[input]
cursor_blink = true
