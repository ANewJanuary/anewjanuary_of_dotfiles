[General]
# pick your favorite image viewer
PreferredImageViewer = auto

# int or css value string like 90%%
# (escape percent with double percent %%)
MaxTextWidth = 80

# 'justify', 'center', 'left', 'right'
TextJustification = center

# currently using pretty=yes is slow
# and taking huge amount of memory
Pretty = yes

PageScrollDuration = 0.2

# either show image as ansi image
# or text 'IMAGE' as a placehoder
# (showing ansi image will affect
# performance & resource usage)
ShowImageAsANSI = yes

[Color Dark]
Background = #000000
Foreground = #BFBDB6
Accent = #FF8F40

[Color Light]
Background = #f5f5f5
Foreground = #1e1e1e
Accent = #0178d4

[Keymaps]
ToggleLightDark = c
ScrollDown = down,j
ScrollUp = up,k
PageDown = ctrl+d,pagedown,l,space
PageUp = ctrl+u,pageup,h
Home = home,g
End = end,G
OpenToc = tab
OpenMetadata = M
OpenHelp = f1
SearchForward = slash
SearchBackward = question_mark
NextMatch = n
PreviousMatch = N
Confirm = enter
CloseOrQuit = q,escape
Screenshot = f12
